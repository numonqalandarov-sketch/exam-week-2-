<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body>
    <section
      class="w-full font-sans antialiased box-border selection:bg-[#a88a5d] selection:text-white"
    >
      <div
        class="w-full bg-[#a88a5d] text-white py-3 px-4 flex justify-center items-center gap-6 text-sm sm:text-base font-medium tracking-wide transition-all"
      >
        <div class="flex items-center gap-2">
          <svg
            class="w-5 h-5 opacity-90"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"
            ></path>
          </svg>
          <span>Скидка 20% на первый заказ</span>
        </div>
        <a
          href="#"
          class="border-b border-white hover:opacity-80 transition-opacity flex items-center gap-1 font-semibold group"
        >
          Заказать
          <svg
            class="w-4 h-4 transform group-hover:translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            ></path>
          </svg>
        </a>
      </div>

      <header
        class="w-full bg-[#f9f6f0] border-b border-[#eaddcd] text-[#3d332a] py-5 px-6 sm:px-12 flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0"
      >
        <a
          href="#"
          class="flex flex-col items-center tracking-widest font-black text-xl leading-none group text-[#3d332a]"
        >
          <span
            class="border-b-2 border-[#3d332a] pb-0.5 group-hover:text-[#a88a5d] group-hover:border-[#a88a5d] transition-colors"
            >ПОРА</span
          >
          <span class="pt-0.5 group-hover:text-[#a88a5d] transition-colors"
            >ПОЕСТЬ</span
          >
        </a>

        <nav
          class="flex flex-wrap justify-center items-center gap-x-6 gap-y-2 text-sm sm:text-base font-medium"
        >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >Подбор рациона</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >Программы питания</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >О нас</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >Доставка</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >Акции</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >FAQ</a
          >
          <a
            href="#"
            class="hover:text-[#a88a5d] transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-[#a88a5d] after:transition-all pb-1"
            >Отзывы</a
          >
        </nav>

        <div class="flex flex-col items-center md:items-end gap-0.5">
          <a
            href="#"
            class="text-xs text-[#2b7a64] font-semibold underline hover:text-[#1f5949] transition-colors tracking-wide"
            >Перезвоните мне</a
          >
          <a
            href="tel:+79885001700"
            class="text-lg sm:text-xl font-bold tracking-tight hover:text-[#a88a5d] transition-colors"
            >+7 988 500-1-700</a
          >
          <span class="text-[11px] text-[#8c8275] font-medium"
            >с 09:00 до 21:00</span
          >
        </div>
      </header>
    </section>
    <section
      class="relative w-full min-h-[600px] md:min-h-[700px] bg-[#f9f6f0] overflow-hidden flex items-center px-6 sm:px-12 md:px-20 lg:px-32 py-12"
    >
      <div
        class="absolute top-[10%] right-[5%] w-24 h-24 sm:w-32 sm:h-32 bg-[#709b82] rounded-full opacity-80 blur-[1px] pointer-events-none z-0"
      ></div>
      <div
        class="absolute bottom-[15%] right-[20%] w-64 h-64 sm:w-80 sm:h-80 bg-[#e5dec9] rounded-full opacity-60 pointer-events-none z-0"
      ></div>

      <div
        class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 items-center relative z-10"
      >
        <div class="lg:col-span-7 flex flex-col justify-center text-left">
          <h1
            class="text-4xl sm:text-5xl lg:text-6xl font-black text-[#1c1a17] leading-[1.15] tracking-tight mb-8 max-w-2xl"
          >
            Доставка прогрессивного питания для гурманов
          </h1>

          <div class="flex flex-wrap items-center gap-4 sm:gap-5">
            <a
              href="#"
              class="px-8 py-4 bg-[#4a8a73] text-white font-semibold rounded-full shadow-md hover:bg-[#3b6f5c] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 text-center text-sm sm:text-base"
            >
              Подобрать питание
            </a>
            <a
              href="#"
              class="px-8 py-4 bg-transparent text-[#4a8a73] font-semibold rounded-full border-2 border-[#4a8a73] hover:bg-[#4a8a73] hover:text-white hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 text-center text-sm sm:text-base"
            >
              Получить консультацию
            </a>
          </div>
        </div>

        <div
          class="lg:col-span-5 flex justify-center lg:justify-end items-center relative"
        >
          <div
            class="relative w-full max-w-[420px] sm:max-w-[480px] lg:max-w-none aspect-square flex justify-center items-center group"
          >
            <div
              class="absolute inset-4 bg-black/10 rounded-full blur-2xl transform scale-95 group-hover:scale-100 transition-transform duration-500 pointer-events-none"
            ></div>

            <img
              src="./src/img/porapoest-top 1.png"
              alt="Пора Поесть Блюдо"
              class="w-full h-full object-contain relative z-10 transform drop-shadow-xl group-hover:rotate-6 transition-transform duration-700 ease-out"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
